name: Hourly self-improve

# Autonomously evolves the Polecat APP (this repo) and, when a cross-repo token
# is provided, the public WEBSITE (kevinrhaas/polecat) every hour — each with a
# dated changelog entry. App changes push to main here (GitHub Pages auto-deploys
# app.polecat.live); website changes push to that repo's default branch.
#
# REQUIRED SECRETS (repo → Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY  – required, so Claude Code can run. (Or swap to
#                        CLAUDE_CODE_OAUTH_TOKEN below.)
#   GH_PAT             – OPTIONAL. A fine-grained PAT with Contents: read/write
#                        on kevinrhaas/polecat (and this repo). When present, the
#                        run also improves the public website. When absent, only
#                        the app is improved.
#
# Test it any time with the "Run workflow" button (workflow_dispatch).

on:
  schedule:
    - cron: '17 * * * *'      # hourly, off the :00 mark
  workflow_dispatch:
    inputs:
      focus:
        description: 'Optional focus for this run (e.g. "mobile polish", "accessibility")'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write        # required by claude-code-action (OIDC)

concurrency:
  group: self-improve
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Improve app + website
        uses: anthropics/claude-code-action@v1
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--max-turns 80 --dangerously-skip-permissions'
          prompt: |
            You are autonomously improving **Polecat** and shipping the results live.
            Operator focus for this run (may be empty): "${{ github.event.inputs.focus }}"

            ── PART 1 — THE APP (this checkout, repo kevinrhaas/polecat-app) ──
            Static site: vanilla HTML/CSS/JS, no build step, no frameworks. Files:
            index.html, css/styles.css, js/{app,providers,config,arbitration,ui}.js,
            changelog.json. Served by GitHub Pages from `main` at app.polecat.live.
            It sends one prompt to many AI models at once and synthesizes a consensus,
            100% in the browser with the user's own keys (plus a keyless free demo via
            a Cloudflare Worker). Features that MUST keep working: multi-model broadcast,
            consensus/arbitration with selectable strategies + arbiter, conversation
            history/sidebar, private mode, settings, image attachments + lightbox,
            vision indicators, animated processing background, free demo, "What's new"
            panel, light/dark, mobile.

            Goal: make Polecat a world-class, fun, elegant, simple yet powerful chat app,
            competitive with Gemini/Claude — but leaning into its real differentiator:
            asking many models at once and making cross-model consensus/arbitration
            effortless and delightful. Favour that angle when choosing improvements.

            Polish targets (match the feel of Gemini's web/mobile app, an explicit
            benchmark — without losing the multi-model identity):
            - A warm, well-centred greeting + logo on the empty state; consider a
              friendly headline like Gemini's "what's on your mind?".
            - Responsive, comfortable sizing on both desktop and mobile (readable
              max-widths, generous spacing, large tap targets).
            - The composer should feel great: auto-growing input, clear send affordance.
            - Reading while streaming must stay comfortable — the user's question stays
              pinned near the top and the answer grows below it (already implemented via
              scrollPairToTop; keep this behaviour, don't regress to auto-scroll-to-bottom).
            - Smooth, subtle motion and transitions; nothing janky.

            Do this:
            1. Read the code to understand the current state. Then read ROADMAP.md.
            2. PRIORITY: if ROADMAP.md has an epic with unchecked steps, advance the
               NEXT unchecked step of the highest-priority epic this run — a real,
               shippable, non-breaking increment. Tick that box in ROADMAP.md. Only if
               the roadmap is empty, or no step can be advanced safely this run, fall
               back to ONE tightly-scoped polish (UX, delight, accessibility, mobile,
               performance) ideally showcasing the multi-model/arbitration strength.
               Keep it simple and elegant, match the existing style, stay 100%
               client-side (no servers, no embedded secrets, no new tracking).
            3. Implement cleanly with NO regressions to the features listed above.
            4. Sanity-check: `node --check` each edited JS file; review your diff.
            5. Prepend a new entry to `changelog.json` (newest first) describing what you
               shipped, with today's date (YYYY-MM-DD) as `date` and an updated top-level
               `updated` field. Keep items short and user-facing.
            6. Commit and push to main (one commit):
                 git add -A
                 git commit -m "<clear, specific message>"
                 git push origin HEAD:main
               If nothing worthwhile changed, make no commit.

            ── PART 2 — THE WEBSITE (only if env GH_PAT is non-empty) ──
            If "$GH_PAT" is empty, skip this part entirely.
            Otherwise also enhance the public marketing site at kevinrhaas/polecat:
              git clone https://x-access-token:$GH_PAT@github.com/kevinrhaas/polecat.git site
            Then, inside ./site:
            1. Read it to learn its structure (it's a static site too).
            2. Make ONE tasteful improvement that keeps it consistent with the app's
               brand and messaging — emphasise the cross-model consensus differentiator,
               clarity, polish, mobile, and a link/CTA to the app (app.polecat.live) and
               the free demo. Do not break it.
            3. Add or update a changelog on the site (a CHANGELOG / "what's new" section or
               file) with today's date and a one-line summary of the change, and a visible
               "last updated <YYYY-MM-DD>" stamp in the footer if one isn't already present.
            4. Commit and push (one commit) to its default branch:
                 cd site
                 git add -A
                 git -c user.name="polecat-bot" -c user.email="bot@polecat.live" commit -m "<message>"
                 git push origin HEAD
            If the website push fails (e.g. token lacks access), log the error and continue
            — do not fail the whole run.

            Keep each part to a single focused commit. Prefer quality over quantity.

      # Prints the website repo's latest commit so each run is auditable (the
      # action itself hides the agent transcript). No-op if GH_PAT isn't set.
      - name: Verify website update
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then echo "GH_PAT not set — website step skipped."; exit 0; fi
          echo "Latest commit on kevinrhaas/polecat:"
          curl -s -H "Authorization: Bearer $GH_PAT" -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/kevinrhaas/polecat/commits?per_page=1" \
          | python3 -c "import sys,json; d=json.load(sys.stdin); c=d[0] if isinstance(d,list) and d else None; print((c['sha'][:7]+'  '+c['commit']['author']['date']+'  '+c['commit']['message'].splitlines()[0]) if c else ('Could not read repo: '+json.dumps(d)[:200]))"
