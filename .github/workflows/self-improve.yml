name: Self-improve (every 2h)

# Autonomously evolves the Polecat APP (this repo) and, when a cross-repo token
# is provided, the public WEBSITE (kevinrhaas/polecat) every hour — each with a
# dated changelog entry. App changes push to main here (GitHub Pages auto-deploys
# app.polecat.live); website changes push to that repo's default branch.
#
# REQUIRED SECRETS (repo → Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY  – required, so Claude Code can run. (Or swap to
#                        CLAUDE_CODE_OAUTH_TOKEN below.)
#   GH_PAT             – OPTIONAL. A fine-grained PAT with Contents: read/write
#                        on kevinrhaas/polecat (and this repo). When present, the
#                        run also improves the public website. When absent, only
#                        the app is improved.
#
# Test it any time with the "Run workflow" button (workflow_dispatch).

on:
  schedule:
    - cron: '17 */2 * * *'    # every 2 hours, off the :00 mark
  workflow_dispatch:
    inputs:
      focus:
        description: 'Optional focus for this run (e.g. "mobile polish", "accessibility")'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write        # required by claude-code-action (OIDC)

concurrency:
  group: self-improve
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Improve app + website
        uses: anthropics/claude-code-action@v1
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          # Use the Claude subscription token only (no per-use API billing).
          # (Don't also pass anthropic_api_key — when both are set the action
          # prefers the API key, which is the dead/credit-capped one.)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--max-turns 80 --dangerously-skip-permissions'
          prompt: |
            You are autonomously improving **Polecat** and shipping the results live.
            Operator focus for this run (may be empty): "${{ github.event.inputs.focus }}"

            ── PART 1 — THE APP (this checkout, repo kevinrhaas/polecat-app) ──
            Static site: vanilla HTML/CSS/JS, no build step, no frameworks. Files:
            index.html, css/styles.css, js/{app,providers,config,arbitration,ui}.js,
            changelog.json. Served by GitHub Pages from `main` at app.polecat.live.
            It sends one prompt to many AI models at once and synthesizes a consensus,
            100% in the browser with the user's own keys (plus a keyless free demo via
            a Cloudflare Worker). Features that MUST keep working: multi-model broadcast,
            consensus/arbitration with selectable strategies + arbiter, conversation
            history/sidebar, private mode, settings, image attachments + lightbox,
            vision indicators, animated processing background, free demo, "What's new"
            panel, light/dark, mobile.

            Goal: make Polecat a world-class, fun, elegant, simple yet powerful chat app,
            competitive with Gemini/Claude — but leaning into its real differentiator:
            asking many models at once and making cross-model consensus/arbitration
            effortless and delightful. Favour that angle when choosing improvements.

            Polish targets (match the feel of Gemini's web/mobile app, an explicit
            benchmark — without losing the multi-model identity):
            - A warm, well-centred greeting + logo on the empty state; consider a
              friendly headline like Gemini's "what's on your mind?".
            - Responsive, comfortable sizing on both desktop and mobile (readable
              max-widths, generous spacing, large tap targets).
            - The composer should feel great: auto-growing input, clear send affordance.
            - Reading while streaming must stay comfortable — the user's question stays
              pinned near the top and the answer grows below it (already implemented via
              scrollPairToTop; keep this behaviour, don't regress to auto-scroll-to-bottom).
            - Smooth, subtle motion and transitions; nothing janky.

            Do this:
            1. Read the code to understand the current state. Then read ROADMAP.md —
               including its "North star & standing directives", which apply to EVERY
               change (beginner-first, clean IA, delight, mobile, innovate-not-thrash).
            2. PRIORITY: if ROADMAP.md has an epic with unchecked steps, advance the
               NEXT unchecked step of the highest-priority epic this run — a real,
               shippable, non-breaking increment. Tick that box in ROADMAP.md.
               HOWEVER, every few runs (use your judgement — e.g. when the app feels
               cluttered or inconsistent) do a "periodic best-practice pass" instead:
               step back and reorganise/simplify menus, settings, and onboarding,
               improve accessibility/mobile, tighten copy, and raise overall craft.
               If the roadmap is empty or no step can be advanced safely, fall back to
               ONE tightly-scoped polish — ideally showcasing the multi-model/
               arbitration strength. Always: simple, elegant, match existing style,
               100% client-side (no servers, no embedded secrets, no new tracking),
               and never regress existing features.
            3. Implement cleanly with NO regressions to the features listed above.
               NEVER use curly/"smart" quotes (‘ ’ “ ”) anywhere in code or HTML —
               they are invalid JS string delimiters and break HTML attributes, and
               have twice crashed the entire app on parse. Use straight ASCII ' and "
               only. (Do not let any tool auto-"smarten" quotes.)
            4. MANDATORY validation gate — run:  node scripts/validate.mjs
               It parses every js/*.js file as an ES *module* (how the browser loads
               them — plain `node --check` runs in script mode and MISSES smart-quote
               syntax errors) and rejects smart quotes. You MUST NOT commit unless it
               exits 0. If it fails, fix the reported file:line and re-run until clean.
               Also review your diff.
            5. Prepend a new entry to `changelog.json` (strictly newest-first) describing
               what you shipped. STAMP IT WITH THE REAL CURRENT TIME — never invent or
               round times, and NEVER use a future date/time. Get the real values from the
               shell and use them verbatim:
                 DATE=$(TZ='America/Chicago' date '+%Y-%m-%d')
                 TIME=$(TZ='America/Chicago' date '+%H:%M CT')
               Set the entry's `date` = $DATE and `time` = $TIME, and set the top-level
               `updated` = "$DATE $TIME". The new entry's time MUST be >= the previous top
               entry's time (real time only moves forward) — if the existing top entries
               have future/incorrect timestamps from earlier runs, still use the real
               current time; do not fabricate a later one to "stay on top". Keep items
               short and user-facing.
            6. Commit and push to main (one commit) — ONLY after validate.mjs passes:
                 node scripts/validate.mjs   # must exit 0
                 git add -A
                 git commit -m "<clear, specific message>"
                 git push origin HEAD:main
               If nothing worthwhile changed, make no commit. NEVER push if
               validate.mjs fails — a broken commit takes down the live site.

            ── PART 2 — THE WEBSITE (only if env GH_PAT is non-empty) ──
            If "$GH_PAT" is empty, skip this part entirely.
            Otherwise also enhance the public marketing site at kevinrhaas/polecat:
              git clone https://x-access-token:$GH_PAT@github.com/kevinrhaas/polecat.git site
            Then, inside ./site:
            1. Read it to learn its structure (it's a static site too).
            2. Make ONE tasteful improvement. FIRST consult the "WEBSITE" section of
               this app repo's ROADMAP.md and advance the next unchecked item there.
               TOP PRIORITY: the examples section is unstyled — replace it with the
               VERIFIED, self-contained component at this repo's
               `website/examples-carousel.html` (it has its own scoped .pcx-* styles +
               script + real content; it was rendered & screenshot-verified). Read that
               file from the app checkout ($GITHUB_WORKSPACE/website/examples-carousel.html)
               and paste its entire <section class="pcx">…</section> block in place of
               the broken examples section. Do NOT rewrite its markup/CSS. Ensure the
               page has <meta charset="utf-8">. CRITICAL: use only straight ASCII quotes
               (' and ") in HTML — never curly/"smart" quotes (‘ ’ “ ”). Smart quotes as
               attribute delimiters (class=”x”) silently break all styling; this exact bug
               left the site's examples section unstyled before. After editing, grep the
               file for those characters and replace any with straight quotes.
               Otherwise make a tasteful polish that keeps it
               consistent with the app's brand — emphasise the cross-model consensus
               differentiator, clarity, polish, mobile, and a link/CTA to the app
               (app.polecat.live) and the free demo. Do not break it. Tick the
               ROADMAP item if you complete it.
            3. Add or update a changelog on the site (a CHANGELOG / "what's new" section or
               file) with a one-line summary, stamped with the REAL current Central time
               (never future/invented): use `TZ='America/Chicago' date '+%Y-%m-%d %H:%M CT'`.
               Put the same "last updated <YYYY-MM-DD HH:MM CT>" stamp in the footer so it
               matches the app's header convention.
            4. Commit and push (one commit) to its default branch — ONLY after the
               site's own validator passes (it rejects smart quotes in HTML attributes):
                 cd site
                 node scripts/validate.mjs   # must exit 0 — if it fails, fix the file:line and re-run
                 git add -A
                 git -c user.name="polecat-bot" -c user.email="bot@polecat.live" commit -m "<message>"
                 git push origin HEAD
               NEVER push the site if validate.mjs fails. If the website push fails
               (e.g. token lacks access), log the error and continue — do not fail
               the whole run.

            Keep each part to a single focused commit. Prefer quality over quantity.

      # Surface agent-level failures (e.g. API out of credit / spend cap): the
      # action reports the step "success" even when the model call errored, so
      # check its result JSON and fail the job loudly if is_error is true.
      - name: Fail if the agent errored
        if: always()
        run: |
          f=/home/runner/work/_temp/claude-execution-output.json
          if [ -f "$f" ] && grep -Eq '"is_error":[[:space:]]*true' "$f"; then
            echo "::error::Claude agent returned is_error=true (likely API credit/spend-limit or auth). Check console.anthropic.com billing."
            exit 1
          fi
          echo "Agent result OK (no is_error)."

      # Prints the website repo's latest commit so each run is auditable (the
      # action itself hides the agent transcript). No-op if GH_PAT isn't set.
      - name: Verify website update
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then echo "GH_PAT not set — website step skipped."; exit 0; fi
          echo "Latest commit on kevinrhaas/polecat:"
          curl -s -H "Authorization: Bearer $GH_PAT" -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/kevinrhaas/polecat/commits?per_page=1" \
          | python3 -c "import sys,json; d=json.load(sys.stdin); c=d[0] if isinstance(d,list) and d else None; print((c['sha'][:7]+'  '+c['commit']['author']['date']+'  '+c['commit']['message'].splitlines()[0]) if c else ('Could not read repo: '+json.dumps(d)[:200]))"
