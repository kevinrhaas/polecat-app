name: Hourly self-improve

# Autonomously evolves the Polecat app every hour using Claude Code, then
# pushes straight to `main` (GitHub Pages auto-deploys app.polecat.live).
#
# REQUIRED ONE-TIME SETUP (only the repo owner can do this):
#   Settings → Secrets and variables → Actions → New repository secret
#     name:  ANTHROPIC_API_KEY   value: <your Anthropic API key>
#   (or set CLAUDE_CODE_OAUTH_TOKEN instead and swap the input below.)
#
# Test it any time via the "Run workflow" button (workflow_dispatch) before
# trusting the hourly schedule.

on:
  schedule:
    - cron: '17 * * * *'      # hourly, off the :00 mark
  workflow_dispatch:
    inputs:
      focus:
        description: 'Optional focus for this run (e.g. "mobile polish", "accessibility")'
        required: false
        default: ''

# Let the job commit & push to main.
permissions:
  contents: write

# Never run two improvement passes at once.
concurrency:
  group: self-improve
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Improve the app
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--max-turns 60 --dangerously-skip-permissions'
          prompt: |
            You are autonomously improving the **Polecat** web app and pushing the result live.

            Context:
            - Pure static site (vanilla HTML/CSS/JS, no build step, no frameworks, no bundler).
            - Files: index.html, css/styles.css, js/app.js, js/providers.js, js/config.js,
              js/arbitration.js, js/ui.js. Served by GitHub Pages from `main` at app.polecat.live.
            - It sends one prompt to many AI models at once and synthesizes a consensus answer,
              100% in the browser with the user's own API keys. Existing features that must keep
              working: multi-model broadcast, consensus/arbitration, conversation history + sidebar,
              private mode, settings modal, image attachments + lightbox, vision indicators,
              animated processing background, light/dark themes, mobile layout.
            - Optional run focus from the operator: "${{ github.event.inputs.focus }}"

            Goal: make Polecat a world-class, fun, elegant, simple, powerful chat app that feels
            great on desktop and mobile.

            This run, do EXACTLY this:
            1. Read the current code to understand the state of the app.
            2. Choose ONE (or a few tightly-related) high-value improvements: UX polish, delight,
               accessibility, mobile/touch, performance, or a genuinely useful feature. Keep it
               simple and elegant and match the existing code style. No frameworks, no build step,
               keep everything client-side (no servers, no embedded secrets, no new tracking).
            3. Implement it cleanly. Do NOT introduce regressions; preserve every feature above.
            4. Sanity-check your changes (syntax-check JS with `node --check`, and review the diff).
            5. If and only if you made a worthwhile change, commit and push to main:
                 git add -A
                 git commit -m "<clear, specific message describing the improvement>"
                 git push origin HEAD:main
               If you decided no change is warranted, make no commit and exit cleanly.

            Do NOT open a pull request. Make at most one commit. Keep the change focused and shippable.
