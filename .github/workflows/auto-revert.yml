name: Guard main (auto-revert)

# Last line of defence for the live site (Pages deploys main → app.polecat.live).
# On every push to main, run the validator. If main is broken, automatically
# revert the offending commit and push the revert, so the live app self-heals
# within ~a minute even if a bad commit slips past the pre-commit gate.
#
# Note: pushes made with GITHUB_TOKEN do NOT trigger workflows, so the revert
# push will not re-trigger this job — no infinite loop.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: guard-main
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate main; auto-revert HEAD if it fails
        run: |
          if node scripts/validate.mjs; then
            echo "main passes validation."
            exit 0
          fi
          echo "::error::main failed validation."
          # Loop guard: never revert an auto-revert (belt-and-suspenders; GITHUB_TOKEN
          # pushes don't re-trigger workflows anyway).
          if git log -1 --pretty=%s | grep -q '^Auto-revert:'; then
            echo "::error::HEAD is already an auto-revert and still failing — not reverting again. Needs a human."
            exit 1
          fi
          bad_subject="$(git log -1 --pretty=%s)"
          bad_sha="$(git rev-parse --short HEAD)"
          git config user.name  "polecat-ci"
          git config user.email "ci@polecat.live"
          if ! git revert --no-edit HEAD; then
            git revert --abort || true
            echo "::error::Auto-revert of $bad_sha failed to apply cleanly — needs a human."
            exit 1
          fi
          git commit --amend -m "Auto-revert: \"$bad_subject\" ($bad_sha) — failed CI validation"
          git push origin HEAD:main
          echo "::error::Reverted $bad_sha. The live app has been restored to the last passing commit. Fix the issue and re-push."
          exit 1
