name = "polecat-demo-proxy"
main = "worker.js"
compatibility_date = "2025-01-01"

# Tunables (safe to edit). The key itself is a SECRET, set separately with:
#   wrangler secret put DEMO_API_KEY
[vars]
UPSTREAM_BASE = "https://openrouter.ai/api/v1"
DEFAULT_MODEL = "meta-llama/llama-3.3-70b-instruct:free"
MAX_TOKENS = "1024"
PER_MIN = "8"

# Native per-IP rate limiting (≈8 requests / 60s). If your wrangler version
# rejects this block, just delete it — the Worker automatically falls back to
# an in-memory limiter. `period` must be 10 or 60.
[[ratelimit]]
binding = "DEMO_RL"
namespace_id = "1001"
simple = { limit = 8, period = 60 }
